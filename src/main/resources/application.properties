spring.application.name=watchparty
server.port=8080

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/watchparty}
spring.servlet.multipart.max-file-size=2048MB
spring.servlet.multipart.max-request-size=2048MB
spring.jackson.serialization.write-dates-as-timestamps=false

app.upload.base-dir=${UPLOAD_BASE_DIR:uploads}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://watch-movies-together.netlify.app}